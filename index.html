<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OCPS Agent Call Tree</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
        <div class="header-text">
          <span class="org-name">Orange County Public Schools</span>
          <span class="tool-name">Agent Call Tree — Department Routing</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-reset" id="btnReset" title="Start Over">
          <i class="fas fa-home"></i> Start Over
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- BREADCRUMB -->
    <nav class="breadcrumb-nav" id="breadcrumbNav" aria-label="Navigation path">
      <ol class="breadcrumb-list" id="breadcrumbList">
        <li class="breadcrumb-item active">Home</li>
      </ol>
    </nav>

    <!-- PROGRESS BAR -->
    <div class="progress-bar-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressBarFill"></div>
      </div>
      <span class="progress-label" id="progressLabel">Step 1 of 3</span>
    </div>

    <!-- CALL TREE STAGE -->
    <section class="stage" id="callTreeStage">
      <div class="stage-header" id="stageHeader">
        <h1 class="stage-title" id="stageTitle">Thank you for calling Orange County Public Schools</h1>
        <p class="stage-subtitle" id="stageSubtitle">Select the category that best describes the caller's issue to route them to the correct OCPS department.</p>

        <!-- Toggle button: only visible on root/home screen -->
        <div class="toggle-cards-wrap" id="toggleCardsWrap">
          <button class="btn-toggle-cards" id="btnToggleCards" aria-expanded="false">
            <span class="toggle-icon"><i class="fas fa-th" id="toggleIcon"></i></span>
            <span class="toggle-label" id="toggleLabel">Show Categories</span>
            <span class="toggle-chevron"><i class="fas fa-chevron-down" id="toggleChevron"></i></span>
          </button>
        </div>

        <!-- Dropdown panel: shown when a category card is hovered/active -->
        <div class="suboptions-panel hidden" id="suboptionsPanel">
          <div class="suboptions-inner" id="suboptionsInner">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
      <div class="options-grid" id="optionsGrid">
        <!-- Populated by JS -->
      </div>
    </section>

    <!-- RESULT CARD -->
    <section class="result-section hidden" id="resultSection">
      <div class="result-card" id="resultCard">
        <!-- Populated by JS -->
      </div>
      <div class="result-actions">
        <button class="btn-secondary" id="btnGoBack"><i class="fas fa-arrow-left"></i> Go Back</button>
        <button class="btn-primary" id="btnStartOver"><i class="fas fa-redo"></i> New Call</button>
      </div>
    </section>

  </main>

  <!-- SEARCH OVERLAY -->
  <button class="fab-search" id="fabSearch" title="Search Departments">
    <i class="fas fa-search"></i>
  </button>

  <div class="search-overlay hidden" id="searchOverlay">
    <div class="search-modal">
      <div class="search-header">
        <h2><i class="fas fa-search"></i> Quick Department Search</h2>
        <button class="btn-close-search" id="btnCloseSearch"><i class="fas fa-times"></i></button>
      </div>
      <input type="text" class="search-input" id="searchInput" placeholder="Type a department name or keyword..." autocomplete="off"/>
      <div class="search-results" id="searchResults">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
